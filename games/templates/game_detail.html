<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ jogo.name }} - Detalhes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0a] text-gray-100">
    <nav class="fixed top-0 w-full bg-[#0a0a0a]/50 backdrop-blur z-50">
        <div class="px-6 py-4 flex items-center justify-between">
            <h1 class="text-[1.65rem] font-bold text-white">Backloggd</h1>
            <div class="flex items-center gap-6">
                <a href="{% url 'index' %}" class="text-gray-400 hover:text-white transition text-sm">Games</a>
                <a href="{% url 'login' %}" class="text-gray-400 hover:text-white transition text-sm">Log In</a>
                <a href="{% url 'signup' %}" class="text-gray-400 hover:text-white transition text-sm">Register</a>
            </div>
        </div>
    </nav>

    <div class="min-h-screen pt-24 px-4 pb-10">
        <div class="max-w-[1100px] mx-auto grid gap-8 lg:grid-cols-[0.8fr_1.2fr] items-start">
            <div class="overflow-hidden border border-gray-800 bg-[#111111] shadow-xl max-w-[360px]">
                {% if jogo.cover_image %}
                    <img src="{{ jogo.cover_image }}" alt="Capa de {{ jogo.name }}" class="w-full h-full object-cover min-h-[360px]">
                {% else %}
                    <div class="flex h-80 items-center justify-center bg-gray-900 text-gray-500">Sem imagem disponível</div>
                {% endif %}
            </div>

            <div class="flex h-full flex-col justify-between gap-8">
                <div class="space-y-6">
                    <div>
                        <h1 class="text-5xl font-bold text-white">{{ jogo.name }}</h1>
                        <p class="mt-3 text-sm uppercase tracking-normal text-gray-500">Lançamento: {{ jogo.release_date|date:'d M Y' }}</p>
                        <p class="mt-4 text-base text-gray-400 leading-relaxed">{{ jogo.description }}</p>
                    </div>

                    <div class="grid gap-4 sm:grid-cols-2 text-gray-300">
                        <div>
                            <p class="text-xs uppercase tracking-normal text-gray-500">Gênero</p>
                            <p class="mt-2 text-lg font-semibold text-white">{{ jogo.genre }}</p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-normal text-gray-500">Plataformas</p>
                            <p class="mt-2 text-lg font-semibold text-white">{{ jogo.platforms }}</p>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                    <a href="{% url 'index' %}" class="inline-flex items-center justify-center rounded-full border border-gray-700 bg-[#111111] px-6 py-3 text-sm font-medium text-gray-200 transition hover:border-gray-500 hover:text-white">Voltar ao catálogo</a>
                    <span class="rounded-full bg-[#2f5bff] px-6 py-3 text-sm font-semibold text-white">Ver mais jogos</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
